# Shopify App Configuration for the Ruby rebuild.
# Point `application_url` at the public HTTPS host serving `app.rb`.

name = "Send Invoice Ruby"
client_id = "your_api_key_here"
application_url = "https://your-tunnel-url.trycloudflare.com"

# Standalone app: Shopify opens it full-page in a new tab instead of inside the
# admin iframe. This app uses its own UI (no App Bridge/Polaris), so embedding
# would be blocked by the browser (no frame-ancestors CSP).
embedded = false

[auth]
redirect_urls = [
  "https://your-tunnel-url.trycloudflare.com/auth/callback"
]

[access_scopes]
scopes = "read_orders"

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
uri = "/webhooks/compliance"
