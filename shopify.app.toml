# Shopify App Configuration for the Ruby rebuild.
# Point `application_url` at the public HTTPS host serving `app.rb`.

name = "Send Invoice Ruby"
client_id = "your_api_key_here"
application_url = "https://your-tunnel-url.trycloudflare.com"

[auth]
redirect_urls = [
  "https://your-tunnel-url.trycloudflare.com/auth/callback"
]

[access_scopes]
scopes = "read_orders"
