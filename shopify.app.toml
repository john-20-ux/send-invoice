name = "Orders Sync Pro"
client_id = "your_api_key_here"
application_url = "https://your-tunnel-url.trycloudflare.com"

[auth]
redirect_urls = [
  "https://your-tunnel-url.trycloudflare.com/auth/callback"
]

[access_scopes]
scopes = "read_orders"

[webhooks]

  [webhooks.privacy_compliance]
  customer_deletion_url = "https://your-tunnel-url.trycloudflare.com/api/webhooks/customer-deletion"
  customer_data_request_url = "https://your-tunnel-url.trycloudflare.com/api/webhooks/customer-data-request"
  shop_deletion_url = "https://your-tunnel-url.trycloudflare.com/api/webhooks/shop-deletion"
