default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 200
      concurrency_maintenance_interval: 300
  workers:
    - queues: [webhooks]
      threads: 2
      polling_interval: 0.1
    - queues: [incremental]
      threads: 4
      polling_interval: 0.2
    - queues: [first_time, bulk, imports]
      threads: 2
      polling_interval: 1
    - queues: [maintenance]
      threads: 1
      polling_interval: 5
  scheduler:
    polling_interval: 5

development:
  dispatchers:
    - polling_interval: 3
      batch_size: 25
      concurrency_maintenance_interval: 300
  workers:
    - queues: [webhooks, incremental, first_time, bulk, imports, maintenance]
      threads: 1
      polling_interval: 1
  scheduler:
    polling_interval: 10

production:
  <<: *default
