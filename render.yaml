services:
  - type: web
    name: send-invoice-staging
    runtime: ruby
    plan: starter
    buildCommand: bundle install
    startCommand: bundle exec ruby app.rb
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "10000"
      - key: BIND_ADDRESS
        value: "0.0.0.0"
      - key: HOST
        sync: false
      # Managed Postgres connection string (provisioned below). The app uses
      # Postgres whenever DATABASE_URL is set, SQLite otherwise.
      - key: DATABASE_URL
        fromDatabase:
          name: send-invoice-db
          property: connectionString
      - key: MOCK_MODE
        value: "false"
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: EXPIRING_OFFLINE_TOKENS
        value: "true"
      - key: SHOPIFY_SCOPES
        value: read_orders
      - key: SHOPIFY_API_VERSION
        value: 2026-04
      # Flip to "true" only after Protected Customer Data access is approved
      # in the Partner Dashboard and the app is reinstalled on the store.
      - key: ENABLE_ORDER_WEBHOOKS
        value: "false"
      - key: AUTO_SYNC_ENABLED
        value: "false"
      - key: AUTO_SYNC_INTERVAL_SECONDS
        value: "300"
      - key: SYNC_API_SECRET
        sync: false
      - key: APP_ENV
        value: staging
      - key: ERROR_WEBHOOK_URL
        sync: false
      - key: ORDER_RETENTION_DAYS
        value: "0"
      - key: BILLING_TEST
        value: "true"

  # Background worker (Solid Queue). Its job queue runs on the same managed
  # Postgres as the app (auto-wired from DATABASE_URL).
  - type: worker
    name: send-invoice-worker
    runtime: ruby
    rootDir: worker_sidecar
    plan: starter
    buildCommand: bundle install && RAILS_ENV=production bin/rails queue:ensure_schema
    startCommand: bin/start
    autoDeploy: true
    envVars:
      - key: RAILS_ENV
        value: production
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: send-invoice-db
          property: connectionString
      # The worker shares the SendInvoice lib, so it needs the same app secrets.
      - key: ENCRYPTION_KEY
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_API_VERSION
        value: 2026-04
      - key: HOST
        sync: false
      - key: APP_ENV
        value: staging
      - key: ERROR_WEBHOOK_URL
        sync: false

databases:
  - name: send-invoice-db
    databaseName: send_invoice
    user: send_invoice
    plan: basic-256mb
