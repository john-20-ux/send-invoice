services:
  - type: web
    name: send-invoice-staging
    runtime: ruby
    plan: starter
    buildCommand: bundle install
    startCommand: bundle exec ruby app.rb
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "10000"
      - key: BIND_ADDRESS
        value: "0.0.0.0"
      - key: HOST
        sync: false
      - key: DATABASE_PATH
        value: /var/data/send_invoice.sqlite3
      - key: MOCK_MODE
        value: "false"
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_SCOPES
        value: read_orders
      - key: SHOPIFY_API_VERSION
        value: 2026-04
      # Flip to "true" only after Protected Customer Data access is approved
      # in the Partner Dashboard and the app is reinstalled on the store.
      - key: ENABLE_ORDER_WEBHOOKS
        value: "false"
      - key: AUTO_SYNC_ENABLED
        value: "false"
      - key: AUTO_SYNC_INTERVAL_SECONDS
        value: "300"
      - key: SYNC_API_SECRET
        sync: false
    disk:
      name: send-invoice-staging-data
      mountPath: /var/data
      sizeGB: 5
