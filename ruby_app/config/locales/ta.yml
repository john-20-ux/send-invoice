          - "கடந்த 30 நாட்கள் தரவு"
          - "1 விலைப்பட்டியல் வார்ப்புரு"
          - "விலைப்பட்டியல்களைப் பதிவிறக்கி அச்சிடவும்"
      basic:
        tagline: "தொடங்குவதற்கு"
        features:
          - "மாதம் 50 விலைப்பட்டியல்கள்"
          - "முழு ஆர்டர் வரலாறு"
          - "தானியங்கி அட்டவணைகள்"
          - "மின்னஞ்சல் மூலம் அனுப்புதல்"
          - "4 விலைப்பட்டியல் வார்ப்புருக்கள்"
          - "மின்னஞ்சல் ஆதரவு"
      pro:
        tagline: "அனைத்தும் வரம்பற்றது"
        features:
          - "வரம்பற்ற விலைப்பட்டியல் ஏற்றுமதி"
          - "முழு ஆர்டர் வரலாறு"
          - "தானியங்கி அட்டவணைகள்"
          - "மின்னஞ்சல் மூலம் அனுப்புதல்"
          - "அனைத்து விலைப்பட்டியல் வார்ப்புருக்கள்"
          - "மின்னஞ்சல் மற்றும் நேரடி அரட்டை ஆதரவு"
