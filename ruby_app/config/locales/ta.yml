      active_metered: "நீங்கள் <strong>%{plan}</strong> திட்டத்தில் உள்ளீர்கள். இந்த மாதம் <strong>%{limit}</strong> இல் <strong>%{used}</strong> விலைப்பட்டியல்களைப் பயன்படுத்தியுள்ளீர்கள்."
      active_unlimited: "நீங்கள் <strong>%{plan}</strong> திட்டத்தில் உள்ளீர்கள். வரம்பற்ற விலைப்பட்டியல் ஏற்றுமதி."
      trial:
        one: "நீங்கள் இலவச சோதனையில் உள்ளீர்கள் — <strong>%{count}</strong> நாள் மீதம், அனைத்து அம்சங்களும் அடங்கும். முடிந்த பிறகு தொடர ஒரு திட்டத்தைத் தேர்வுசெய்யவும்."
        other: "நீங்கள் இலவச சோதனையில் உள்ளீர்கள் — <strong>%{count}</strong> நாட்கள் மீதம், அனைத்து அம்சங்களும் அடங்கும். முடிந்த பிறகு தொடர ஒரு திட்டத்தைத் தேர்வுசெய்யவும்."
      ended: "உங்கள் இலவச சோதனை முடிந்தது. விலைப்பட்டியல்களை அனுப்பத் தொடர ஒரு திட்டத்தைத் தேர்வுசெய்யவும்."
