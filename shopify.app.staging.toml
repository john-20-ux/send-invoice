# Shopify staging app configuration for the Ruby app.
# Replace the placeholder values after your staging host is live.

name = "Send Invoice Staging"
client_id = "004bf076589503625e9ba0d6bd4b8804"
application_url = "https://staging.sendinvoice.yourdomain.com"

# Standalone app: Shopify opens it full-page in a new tab instead of inside the
# admin iframe. This app uses its own UI (no App Bridge/Polaris), so embedding
# would be blocked by the browser (no frame-ancestors CSP).
embedded = false

[auth]
redirect_urls = [
  "https://staging.sendinvoice.jens-ttjvfvpi.myshopify.com/auth/callback"
]

[access_scopes]
scopes = "read_orders"

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
uri = "/webhooks/compliance"
